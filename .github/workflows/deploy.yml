name: Deploy Frontend to EC2

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 拉取代码
      - uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci
      
      # 4. 构建生产版本
      - name: Build production
        run: npm run build:prod
      
      # 5. 将打包文件传输到 EC2
      - name: Copy dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist"
          target: "/home/${{ secrets.EC2_USER }}/mindgpt-frontend"
      
      # 6. 在 EC2 上部署到 Nginx
      - name: Deploy to Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTAPI }}
          username: ${{ secrets.HOSTUSER1 }}
          key: ${{ secrets.KEYWEB }}
          script: |
            echo "🚀 Starting deployment..."
            
            # 备份旧的部署文件
            if [ -d "/home/${{ secrets.EC2_USER }}/nginx-html" ]; then
              echo "Backing up old files..."
              cp -r /home/${{ secrets.EC2_USER }}/nginx-html /home/${{ secrets.EC2_USER }}/nginx-html.backup
            fi
            
            # 创建 Nginx 静态文件目录
            mkdir -p /home/${{ secrets.EC2_USER }}/nginx-html
            
            # 复制新的构建文件到 Nginx 目录
            echo "Copying new files..."
            cp -r /home/${{ secrets.EC2_USER }}/mindgpt-frontend/dist/* /home/${{ secrets.EC2_USER }}/nginx-html/
            
            # 重新加载 Nginx 配置
            echo "Reloading Nginx..."
            sudo nginx -t && sudo nginx -s reload
            
            # 清理备份（保留最近一次）
            rm -rf /home/${{ secrets.EC2_USER }}/nginx-html.backup
            
            # 清理临时上传目录
            rm -rf /home/${{ secrets.EC2_USER }}/mindgpt-frontend
            
            echo "✅ Deployment completed!"
